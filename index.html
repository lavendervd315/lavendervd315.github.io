<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            color: #2c3e50;
            background: #fff;
        }

        #pdf-content {
            max-width: 595px;
            margin: 0 auto;
            padding: 20px 30px 10px 30px;
            border: 3px double #1a3c5e;
            outline: 1px solid #d5dce4;
            outline-offset: 4px;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 3px solid #1a3c5e;
            margin-bottom: 0;
        }

        .hotel-brand {
            font-size: 22pt;
            font-weight: 700;
            color: #1a3c5e;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 1px;
        }

        .hotel-contact-header {
            font-size: 8pt;
            color: #7f8c8d;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* ===== TITLE SECTION ===== */
        .title-section {
            background: linear-gradient(135deg, #1a3c5e 0%, #2c5f8a 100%);
            color: #ffffff;
            text-align: center;
            padding: 10px 20px;
            margin-bottom: 12px;
        }

        .booking-title {
            font-size: 13pt;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .booking-subtitle {
            font-size: 7.5pt;
            margin-top: 3px;
            opacity: 0.9;
            font-style: italic;
        }

        /* ===== BOOKING CODE HIGHLIGHT ===== */
        .booking-code-section {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
        }

        .booking-code-box {
            border: 2px dashed #c0943b;
            padding: 5px 25px;
            text-align: center;
            background: #fefdf5;
        }

        .booking-code-label {
            font-size: 7pt;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .booking-code-value {
            font-size: 14pt;
            font-weight: 700;
            color: #1a3c5e;
            letter-spacing: 3px;
        }

        /* ===== INFO GRID ===== */
        .info-section {
            margin-bottom: 10px;
        }

        .section-label {
            font-size: 8pt;
            font-weight: 700;
            text-transform: uppercase;
            color: #1a3c5e;
            letter-spacing: 1.5px;
            padding-bottom: 3px;
            border-bottom: 1.5px solid #d5dce4;
            margin-bottom: 4px;
        }

        .info-grid {
            display: table;
            width: 100%;
        }

        .info-row {
            display: table-row;
        }

        .info-label {
            display: table-cell;
            padding: 4px 10px 4px 0;
            font-size: 8.5pt;
            color: #5a6a7a;
            width: 38%;
            border-bottom: 1px solid #ecf0f1;
            vertical-align: middle;
        }

        .info-value {
            display: table-cell;
            padding: 4px 0;
            font-size: 9pt;
            font-weight: 600;
            color: #2c3e50;
            border-bottom: 1px solid #ecf0f1;
            vertical-align: middle;
        }

        .info-row:last-child .info-label,
        .info-row:last-child .info-value {
            border-bottom: none;
        }

        /* ===== FINANCIAL SECTION ===== */
        .financial-section {
            background: #f8f9fa;
            border: 1px solid #e2e8ee;
            padding: 8px 14px;
            margin-bottom: 0;
        }

        .financial-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            font-size: 8.5pt;
        }

        .financial-row:not(:last-child) {
            border-bottom: 1px dotted #d5dce4;
        }

        .financial-label {
            color: #5a6a7a;
        }

        .financial-value {
            font-weight: 600;
            color: #2c3e50;
        }

        .financial-row.total {
            padding-top: 6px;
            margin-top: 2px;
            border-top: 2px solid #1a3c5e;
            border-bottom: none !important;
        }

        .financial-row.total .financial-label {
            font-size: 9.5pt;
            font-weight: 700;
            color: #1a3c5e;
        }

        .financial-row.total .financial-value {
            font-size: 11pt;
            font-weight: 700;
            color: #c0943b;
        }

        /* ===== NOTE ===== */
        .note-section {
            margin-bottom: 8px;
            margin-top: 10px;
        }

        .note-box {
            background: #fff9ed;
            border-left: 3px solid #c0943b;
            padding: 6px 12px;
            font-size: 8pt;
            color: #5a6a7a;
            min-height: 20px;
        }

        .note-label-inline {
            font-weight: 700;
            color: #c0943b;
            margin-right: 6px;
        }

        /* ===== DIVIDER ===== */
        .divider {
            display: flex;
            align-items: center;
            margin: 15 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #d5dce4;
        }

        .divider-icon {
            margin: 0 12px;
            color: #c0943b;
            font-size: 10pt;
        }

        /* ===== HOTEL INFO FOOTER ===== */
        .hotel-info-footer {
            background: #1a3c5e;
            color: #ffffff;
            padding: 10px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }

        .hotel-info-left {
            flex: 1;
        }

        .hotel-footer-name {
            font-size: 11pt;
            font-weight: 700;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }

        .hotel-footer-detail {
            font-size: 8pt;
            opacity: 0.85;
            line-height: 1.6;
        }

        .hotel-footer-detail .icon-text {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hotel-footer-detail svg {
            width: 12px;
            height: 12px;
            fill: #c0943b;
            flex-shrink: 0;
        }

        /* ===== PAGE FOOTER ===== */
        .footer {
            text-align: center;
            font-size: 7pt;
            color: #95a5a6;
            padding-top: 4px;
            border-top: 1px solid #ecf0f1;
            letter-spacing: 0.5px;
        }

        /* ===== PRINT OPTIMIZATION ===== */
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            #pdf-content {
                padding: 20px 30px;
            }
        }
    </style>
</head>

<body>
    <div id="pdf-content" style="margin-top: 30px;">

        <!-- HEADER -->
        <div class="header">
            <div class="hotel-brand hotelName">SA Hotel</div>
            <div class="hotel-contact-header">
                <span data-key="tel"></span> <span data-value="hotelPhone"></span>
                &nbsp;&bull;&nbsp;
                <span data-key="address"></span> <span data-value="hotelAddress"></span>
            </div>
        </div>

        <!-- TITLE -->
        <div class="title-section">
            <div class="booking-title" data-key="bookingConfirmationTitle"></div>
            <div class="booking-subtitle" data-key="bookingConfirmationText"></div>
        </div>

        <!-- BOOKING CODE HIGHLIGHT -->
        <div class="booking-code-section">
            <div class="booking-code-box">
                <div class="booking-code-label" data-key="bookingCode"></div>
                <div class="booking-code-value" data-value="bookingCode">XXXX-XXXX</div>
            </div>
        </div>

        <!-- GUEST INFO -->
        <div class="info-section">
            <div class="section-label" data-key="guestInfo"></div>
            <div class="info-grid">
                <div class="info-row">
                    <div class="info-label" data-key="customer"></div>
                    <div class="info-value" data-value="customerName">Nguyễn Văn A</div>
                </div>
                <div class="info-row">
                    <div class="info-label" data-key="phone"></div>
                    <div class="info-value" data-value="customerPhone">012345678</div>
                </div>
            </div>
        </div>

        <!-- ROOM DETAILS -->
        <div class="info-section">
            <div class="section-label" data-key="roomDetails"></div>
            <div class="info-grid">
                <div class="info-row">
                    <div class="info-label" data-key="bookingDate"></div>
                    <div class="info-value" data-value="bookingDate">2024/1/1</div>
                </div>
                <div class="info-row">
                    <div class="info-label" data-key="roomBooking"></div>
                    <div class="info-value" data-value="roomBooking">Phòng đơn</div>
                </div>
                <div class="info-row">
                    <div class="info-label" data-key="checkInDate"></div>
                    <div class="info-value" data-value="bookingDateStart">2020/2/2</div>
                </div>
                <div class="info-row">
                    <div class="info-label" data-key="checkOutDate"></div>
                    <div class="info-value" data-value="bookingDateEnd">2020/2/5</div>
                </div>
            </div>
        </div>

        <!-- FINANCIAL -->
        <div class="info-section">
            <div class="section-label" data-key="paymentInfo"></div>
            <div class="financial-section">
                <div class="financial-row total">
                    <span class="financial-label" data-key="totalAmount"></span>
                    <span class="financial-value" data-value="totalAmount">0</span>
                </div>
                <div class="financial-row">
                    <span class="financial-label" data-key="depositAmount"></span>
                    <span class="financial-value" data-value="depositAmount">0</span>
                </div>
                <div class="financial-row">
                    <span class="financial-label" data-key="remainingAmount"></span>
                    <span class="financial-value" data-value="remainingAmount">0</span>
                </div>
            </div>
        </div>

        <!-- NOTE -->
        <div class="note-section">
            <div class="note-box">
                <span class="note-label-inline" data-key="note"></span>
                <span data-value="note"></span>
            </div>
        </div>

        <!-- DIVIDER -->
        <div class="divider">
            <span class="divider-icon">&#9830;</span>
        </div>

        <!-- HOTEL INFO FOOTER -->
        <div class="hotel-info-footer">
            <div class="hotel-info-left">
                <div class="hotel-footer-name hotelName">SA Hotel</div>
                <div class="hotel-footer-detail">
                    <div class="icon-text">
                        <svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2a1.003 1.003 0 011.01-.24c1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                        <span data-value="hotelPhone"></span>
                    </div>
                    <div class="icon-text">
                        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg>
                        <span data-value="hotelAddress"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            Copyright &copy; by SA TECHNOLOGY JSC
        </div>
    </div>

    <script>
        // JSON cho đa ngôn ngữ
        const languages = {
            "vi": {
                "customer": "Khách hàng",
                "phone": "Số điện thoại",
                "bookingCode": "Mã đặt phòng",
                "bookingDate": "Ngày đặt phòng",
                "roomBooking": "Phòng đặt",
                "checkInDate": "Ngày nhận phòng",
                "checkOutDate": "Ngày trả phòng",
                "totalAmount": "Tổng tiền",
                "depositAmount": "Đã cọc",
                "remainingAmount": "Còn lại",
                "note": "Ghi chú",
                "bookingConfirmationTitle": "Xác nhận đặt phòng",
                "bookingConfirmationText": "Vui lòng xuất trình xác nhận này tại quầy lễ tân để hoàn tất thủ tục nhận phòng.",
                "tel": "ĐT", 
                "address": "Địa chỉ",
                "guestInfo": "Thông tin khách hàng",
                "roomDetails": "Chi tiết phòng",
                "paymentInfo": "Thanh toán"
            },
            "en": {
                "customer": "Customer",
                "phone": "Phone Number",
                "bookingCode": "Booking Code",
                "bookingDate": "Booking Date",
                "roomBooking": "Room Booking",
                "checkInDate": "Check-in Date",
                "checkOutDate": "Check-out Date",
                "totalAmount": "Total Amount",
                "depositAmount": "Deposit",
                "remainingAmount": "Remaining",
                "note": "Note",
                "bookingConfirmationTitle": "Booking Confirmation",
                "bookingConfirmationText": "Please present this confirmation at the front desk to complete check-in.",
                "tel": "Tel",
                "address": "Address",
                "guestInfo": "Guest Information",
                "roomDetails": "Room Details",
                "paymentInfo": "Payment"
            }
        };

        // Hàm lấy parameter từ URL
        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name) || null;
        }

        // Decode an toàn, không crash khi có ký tự % không hợp lệ
        function safeDecode(str) {
            try {
                return decodeURIComponent(str);
            } catch (e) {
                return str;
            }
        }

        // Định dạng tiền tệ theo quy chuẩn quốc tế:
        // - Việt Nam (vi-VN): dấu chấm phân tách hàng nghìn, VND không có phần thập phân. Ví dụ: 1.500.000
        // - Quốc tế (en-US): dấu phẩy phân tách hàng nghìn, dấu chấm thập phân. Ví dụ: 1,500,000
        function formatCurrency(value, lang) {
            if (!value) return '0';
            // Loại bỏ tất cả ký tự phân tách hiện có (dấu chấm, dấu phẩy, khoảng trắng)
            const cleanValue = value.toString().replace(/[.,\s]/g, '');
            const num = Number(cleanValue);
            if (isNaN(num)) return value;
            if (lang === 'en') {
                // Quy chuẩn quốc tế: dấu phẩy phân tách hàng nghìn
                return num.toLocaleString('en-US');
            }
            // Quy chuẩn Việt Nam: dấu chấm phân tách hàng nghìn
            return num.toLocaleString('vi-VN');
        }

        // Hàm thay đổi ngôn ngữ và nhận param từ URL
        function initData() {

            // Lấy dữ liệu mới từ URL parameters
            const currentLanguage = getUrlParameter('i18n') || 'vi';
            const customerName = safeDecode(getUrlParameter('customerName') || 'Nguyễn Văn A');
            const customerPhone = getUrlParameter('customerPhone') || '0999999999';
            const bookingCode = getUrlParameter('bookingCode') || 'XXXX';
            const bookingDate = getUrlParameter('bookingDate') || '21-02-2025';
            const bookingDateStart = getUrlParameter('bookingDateStart') || '23-02-2025';
            const bookingDateEnd = getUrlParameter('bookingDateEnd') || '25-02-2025';
            const roomBooking = safeDecode(getUrlParameter('roomBooking') || 'Phòng VIP');
            const totalAmount = formatCurrency(getUrlParameter('totalAmount') || '0', currentLanguage);
            const depositAmount = formatCurrency(getUrlParameter('depositAmount') || '0', currentLanguage);
            const remainingAmount = formatCurrency(getUrlParameter('remainingAmount') || '0', currentLanguage);
            const note = safeDecode(getUrlParameter('note') || 'Không có ghi chú nào.');

            const hotelName = safeDecode(getUrlParameter('hotelName') || 'SA Hotel');
            const hotelAddress = safeDecode(getUrlParameter('hotelAddress') || 'Tiền Hải - Thái Bình');
            const hotelPhone = getUrlParameter('hotelPhone') || '0888888888';

            // Cập nhật hotelName
            const hotelNameElements = document.getElementsByClassName('hotelName');
            for (let element of hotelNameElements) {
                element.textContent = hotelName;
            }

            // Các key không thêm dấu ':'
            const noColonKeys = [
                'bookingConfirmationTitle', 'bookingConfirmationText',
                'guestInfo', 'roomDetails', 'paymentInfo'
            ];

            if (languages) {
                // Cập nhật văn bản cho các phần tử có data-key
                document.querySelectorAll('[data-key]').forEach(element => {
                    const key = element.getAttribute('data-key');
                    if (languages[currentLanguage][key] !== undefined) {
                        if (noColonKeys.includes(key)) {
                            element.textContent = languages[currentLanguage][key];
                        } else {
                            element.textContent = languages[currentLanguage][key] + ':';
                        }
                    }
                });

                // Cập nhật giá trị dữ liệu (data-value) từ URL parameters
                const dataMap = {
                    customerName, customerPhone, bookingCode, bookingDate,
                    roomBooking,
                    bookingDateStart, bookingDateEnd,
                    totalAmount, depositAmount, remainingAmount, note,
                    hotelName, hotelPhone, hotelAddress
                };

                document.querySelectorAll('[data-value]').forEach(element => {
                    const key = element.getAttribute('data-value');
                    if (dataMap[key] !== undefined) {
                        element.textContent = dataMap[key];
                    } else {
                        element.textContent = '';
                    }
                });
            }
        }

        // Gọi hàm khởi tạo khi trang tải
        window.onload = function () {
            initData();

            var element = document.getElementById('pdf-content');
            var opt = {
                margin: [10, 0, 10, 0],
                filename: 'Booking_Confirmation.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, logging: false },
                jsPDF: { unit: 'pt', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().from(element).set(opt).outputPdf('blob').then(function (pdfBlob) {
                const blobUrl = URL.createObjectURL(pdfBlob);
                window.open(blobUrl);
            });
        };
    </script>
</body>

</html>
